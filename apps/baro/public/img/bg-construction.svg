<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#8a6500" stroke-width="0.5" opacity="0.12"/>
    </pattern>
    <pattern id="dot-grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="#8a6500" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Fondo transparente — deja ver el bg del contenedor -->
  <rect width="1440" height="900" fill="none"/>

  <!-- Grilla fina -->
  <rect width="1440" height="900" fill="url(#grid)"/>
  <rect width="1440" height="900" fill="url(#dot-grid)"/>

  <!-- Marco exterior del plano -->
  <rect x="40" y="40" width="1360" height="820" fill="none" stroke="#8a6500" stroke-width="0.5" opacity="0.12"/>
  <rect x="44" y="44" width="1352" height="812" fill="none" stroke="#8a6500" stroke-width="0.3" opacity="0.1"/>

  <!-- Esquina superior izquierda — compás/geometría -->
  <g opacity="0.15">
    <circle cx="120" cy="120" r="320" fill="none" stroke="#8a6500" stroke-width="0.7"/>
    <circle cx="120" cy="120" r="240" fill="none" stroke="#8a6500" stroke-width="0.5"/>
    <circle cx="120" cy="120" r="160" fill="none" stroke="#8a6500" stroke-width="0.4"/>
    <line x1="120" y1="0" x2="120" y2="440" stroke="#8a6500" stroke-width="0.6" stroke-dasharray="4 6"/>
    <line x1="0" y1="120" x2="440" y2="120" stroke="#8a6500" stroke-width="0.6" stroke-dasharray="4 6"/>
  </g>

  <!-- Esquina inferior derecha — arco -->
  <g opacity="0.12">
    <circle cx="1320" cy="780" r="260" fill="none" stroke="#8a6500" stroke-width="0.7"/>
    <circle cx="1320" cy="780" r="180" fill="none" stroke="#8a6500" stroke-width="0.5"/>
    <line x1="1320" y1="520" x2="1320" y2="900" stroke="#8a6500" stroke-width="0.6" stroke-dasharray="4 6"/>
    <line x1="1060" y1="780" x2="1440" y2="780" stroke="#8a6500" stroke-width="0.6" stroke-dasharray="4 6"/>
  </g>

  <!-- Línea horizontal de referencia -->
  <line x1="40" y1="280" x2="1400" y2="280" stroke="#8a6500" stroke-width="0.5" opacity="0.1"/>
  <line x1="40" y1="620" x2="1400" y2="620" stroke="#8a6500" stroke-width="0.5" opacity="0.1"/>

  <!-- Cota decorativa (esquina inferior izquierda) -->
  <g opacity="0.1">
    <line x1="80" y1="780" x2="200" y2="780" stroke="#8a6500" stroke-width="0.7"/>
    <line x1="80" y1="768" x2="80" y2="792" stroke="#8a6500" stroke-width="0.5"/>
    <line x1="200" y1="768" x2="200" y2="792" stroke="#8a6500" stroke-width="0.5"/>
    <line x1="100" y1="780" x2="100" y2="786" stroke="#8a6500" stroke-width="0.4"/>
    <line x1="120" y1="780" x2="120" y2="786" stroke="#8a6500" stroke-width="0.4"/>
    <line x1="140" y1="780" x2="140" y2="786" stroke="#8a6500" stroke-width="0.4"/>
    <line x1="160" y1="780" x2="160" y2="786" stroke="#8a6500" stroke-width="0.4"/>
    <line x1="180" y1="780" x2="180" y2="786" stroke="#8a6500" stroke-width="0.4"/>
  </g>
</svg>
