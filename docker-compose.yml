# Unified multisystem stack — shared Postgres, central API, Caddy, six Next.js apps.
# Usage: docker compose up --build -d
# Copy .env.example to .env and adjust values per environment.

x-app-env: &app-env
  NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
  API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3000}
  NODE_ENV: ${NODE_ENV:-production}

x-next-build-args: &next-build-args
  NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
  NEXT_PUBLIC_HUB_URL: ${HUB_URL:-http://localhost:3001}
  NEXT_PUBLIC_SHOPFLOW_URL: ${SHOPFLOW_URL:-http://localhost:3002}
  NEXT_PUBLIC_WORKIFY_URL: ${WORKIFY_URL:-http://localhost:3003}
  NEXT_PUBLIC_TECHSERVICES_URL: ${TECHSERVICES_URL:-http://localhost:3004}
  NEXT_PUBLIC_BALANCE_URL: ${BALANCE_URL:-http://localhost:3005}
  NEXT_PUBLIC_BARO_URL: ${BARO_URL:-http://localhost:3006}

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${STACK_NAME:-multisystem}-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-multisystem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multisystem}
      POSTGRES_DB: ${POSTGRES_DB:-multisystem}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    networks:
      - caddy_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-multisystem} -d ${POSTGRES_DB:-multisystem}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: ${STACK_NAME:-multisystem}-api
    restart: unless-stopped
    environment:
      PORT: '3000'
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-multisystem}:${POSTGRES_PASSWORD:-multisystem}@postgres:5432/${POSTGRES_DB:-multisystem}
      PRISMA_USE_PG_ADAPTER: 'true'
      JWT_SECRET: ${JWT_SECRET?JWT_SECRET is required}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY?FIELD_ENCRYPTION_KEY is required}
      CORS_ORIGIN: ${CORS_ORIGIN?CORS_ORIGIN is required}
      TRUST_PROXY: 'true'
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - caddy_network

  caddy:
    image: caddy:2-alpine
    container_name: ${STACK_NAME:-multisystem}-caddy
    restart: unless-stopped
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.multisystem.app}
      HUB_DOMAIN: ${HUB_DOMAIN:-hub.multisystem.app}
      BARO_DOMAIN: ${BARO_DOMAIN:-forms.baroconstruccionessrl.com.ar}
      WORKIFY_DOMAIN: ${WORKIFY_DOMAIN:-rrhh.baroconstruccionessrl.com.ar}
      SHOPFLOW_DOMAIN: ${SHOPFLOW_DOMAIN:-pos.baroconstruccionessrl.com.ar}
      TECHSERVICES_DOMAIN: ${TECHSERVICES_DOMAIN:-techservices.multisystem.app}
      BALANCE_DOMAIN: ${BALANCE_DOMAIN:-balance.multisystem.app}
      UPDATE_DOMAIN: ${UPDATE_DOMAIN:-update.multisystem.app}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      - caddy_network
    depends_on:
      - api
      - hub
      - shopflow
      - workify
      - techservices
      - balance
      - baro

  hub:
    build:
      context: .
      dockerfile: docker/Dockerfile.nextjs
      args:
        <<: *next-build-args
        PACKAGE: '@multisystem/hub'
        APP_DIR: hub
        PORT: '3001'
        NEXT_PUBLIC_HUB_URL: ${HUB_URL?HUB_URL is required}
        NEXT_PUBLIC_SHOPFLOW_URL: ${SHOPFLOW_URL?SHOPFLOW_URL is required}
        NEXT_PUBLIC_WORKIFY_URL: ${WORKIFY_URL?WORKIFY_URL is required}
        NEXT_PUBLIC_TECHSERVICES_URL: ${TECHSERVICES_URL:-http://localhost:3004}
        NEXT_PUBLIC_BALANCE_URL: ${BALANCE_URL:-http://localhost:3005}
        NEXT_PUBLIC_BARO_URL: ${BARO_URL?BARO_URL is required}
    container_name: ${STACK_NAME:-multisystem}-hub
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: '3001'
    networks:
      - caddy_network
    depends_on:
      - api

  shopflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.nextjs
      args:
        <<: *next-build-args
        PACKAGE: '@multisystem/shopflow'
        APP_DIR: shopflow
        PORT: '3002'
        NEXT_PUBLIC_SHOPFLOW_URL: ${SHOPFLOW_URL?SHOPFLOW_URL is required}
        NEXT_PUBLIC_HUB_URL: ${HUB_URL?HUB_URL is required}
        NEXT_PUBLIC_WORKIFY_URL: ${WORKIFY_URL?WORKIFY_URL is required}
    container_name: ${STACK_NAME:-multisystem}-shopflow
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: '3002'
    networks:
      - caddy_network
    depends_on:
      - api

  workify:
    build:
      context: .
      dockerfile: docker/Dockerfile.nextjs
      args:
        <<: *next-build-args
        PACKAGE: '@multisystem/workify'
        APP_DIR: workify
        PORT: '3003'
        NEXT_PUBLIC_WORKIFY_URL: ${WORKIFY_URL?WORKIFY_URL is required}
        NEXT_PUBLIC_HUB_URL: ${HUB_URL?HUB_URL is required}
    container_name: ${STACK_NAME:-multisystem}-workify
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: '3003'
    networks:
      - caddy_network
    depends_on:
      - api

  techservices:
    build:
      context: .
      dockerfile: docker/Dockerfile.nextjs
      args:
        <<: *next-build-args
        PACKAGE: '@multisystem/techservices'
        APP_DIR: techservices
        PORT: '3004'
        NEXT_PUBLIC_TECHSERVICES_URL: ${TECHSERVICES_URL:-http://localhost:3004}
    container_name: ${STACK_NAME:-multisystem}-techservices
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: '3004'
    networks:
      - caddy_network
    depends_on:
      - api

  balance:
    build:
      context: .
      dockerfile: docker/Dockerfile.nextjs
      args:
        <<: *next-build-args
        PACKAGE: '@multisystem/balance'
        APP_DIR: balance
        PORT: '3005'
        NEXT_PUBLIC_BALANCE_URL: ${BALANCE_URL:-http://localhost:3005}
        NEXT_PUBLIC_HUB_URL: ${HUB_URL?HUB_URL is required}
    container_name: ${STACK_NAME:-multisystem}-balance
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: '3005'
    networks:
      - caddy_network
    depends_on:
      - api

  baro:
    build:
      context: .
      dockerfile: docker/Dockerfile.nextjs
      args:
        <<: *next-build-args
        PACKAGE: '@multisystem/baro'
        APP_DIR: baro
        PORT: '3006'
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
        NEXT_PUBLIC_HUB_URL: ${HUB_URL?HUB_URL is required}
        NEXT_PUBLIC_BARO_URL: ${BARO_URL?BARO_URL is required}
    container_name: ${STACK_NAME:-multisystem}-baro
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: '3006'
    ports:
      - '3006:3006'
    networks:
      - caddy_network
    depends_on:
      - api

networks:
  caddy_network:
    name: ${NETWORK_NAME:-multisystem-caddy-network}
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
