services:
  postgres:
    image: postgres:16-alpine
    container_name: multisystem-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: multisystem
      POSTGRES_PASSWORD: multisystem
      POSTGRES_DB: multisystem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
